name: Build and Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and Push Frontend
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
          tags: ${{ secrets.DOCKER_USERNAME }}/frontend:latest
          push: true
          
      - name: Build and Push HTTP Backend
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./docker/DockerFile.backend
          tags: ${{ secrets.DOCKER_USERNAME }}/http-backend:latest
          push: true
          
      - name: Build and Push WS Backend
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./docker/Dockerfile.websocket
          tags: ${{ secrets.DOCKER_USERNAME }}/ws-backend:latest
          push: true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy docker-compose.prod.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/${{ secrets.EC2_USERNAME }}/drawapp"

      - name: Execute deployment commands on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the app directory (ensure it exists)
            mkdir -p /home/${{ secrets.EC2_USERNAME }}/drawapp
            cd /home/${{ secrets.EC2_USERNAME }}/drawapp
            
            # Create/Update .env file containing the required variables
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > .env
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
            
            # Pull latest images from Docker Hub
            docker compose -f docker-compose.prod.yml pull
            
            # Restart services
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d
